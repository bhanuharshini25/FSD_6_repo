<!DOCTYPE html>
<html>
<body>

<script>
    // 1. Using document.write()
    document.write("Hello using document.write()<br>");

    // 2. Using alert()
    alert("Hello using alert()");

    // 3. Using console.log()
    console.log("Hello using console.log()");

    // 4. Using innerHTML
    document.body.innerHTML += "<br>Hello using innerHTML";
</script>

</body>
</html>
